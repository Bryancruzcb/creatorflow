name: CreatorFlow release gate

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: Repository-relative CreatorFlow manifest path
        required: true
        default: creatorflow-manifest.json

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Require the manifest to exist
        shell: bash
        env:
          MANIFEST_PATH: ${{ inputs.manifest }}
        run: |
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "::error::No manifest at '$MANIFEST_PATH'. Export one from the desktop release workflow and commit it, or generate one with ManifestCli (repeat --exclude for fixture/vendor directories, e.g. --exclude stress-fixtures) and pass its path as the 'manifest' input."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build release-gate CLI
        run: mvn -B -q -pl core package dependency:copy-dependencies -DincludeScope=runtime

      - name: Evaluate manifest
        id: gate
        shell: bash
        env:
          MANIFEST_PATH: ${{ inputs.manifest }}
        run: |
          set +e
          java -cp 'core/target/classes:core/target/dependency/*' \
            creatorflow.manifest.ReleaseGateCli \
            "$MANIFEST_PATH" --output core/target/creatorflow-gate-report.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload machine-readable report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: creatorflow-gate-report
          path: core/target/creatorflow-gate-report.json
          if-no-files-found: warn

      - name: Enforce result
        shell: bash
        run: test '${{ steps.gate.outputs.exit_code }}' -eq 0
