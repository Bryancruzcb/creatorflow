# Dependency security + freshness. Dependabot opens PRs when a dependency has a
# newer version or a known vulnerability (an SCA scan, the cheapest rung of a real
# security check). See docs/adding-animation-rigs.md's security notes.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
