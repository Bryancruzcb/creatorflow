<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Error')}"></head>
<body>
<div class="shell">
    <div class="main">
        <header class="topbar">
            <a class="wordmark" th:href="@{/}" style="padding:0">CreatorFlow<small>screening room</small></a>
        </header>

        <main class="content">
            <div class="empty">
                <strong th:text="${status != null} ? ${status} + ' — ' + ${error} : 'Something went wrong'">Error</strong>
                <span th:if="${message != null and message != ''}" th:text="${message}"></span>
                <p style="margin-top:14px"><a th:href="@{/}">Back to the gallery</a></p>
            </div>
        </main>

        <footer th:replace="~{fragments :: footer}"></footer>
    </div>
</div>
</body>
</html>
