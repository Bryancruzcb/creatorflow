# CreatorFlow platform — community gallery + fingerprint registry
server.port=8080

# H2 file database in the user's home; AUTO_SERVER lets tools inspect it while running
spring.datasource.url=jdbc:h2:file:${user.home}/.creatorflow-server/registry;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Uploaded gallery files (content-addressed by SHA-256)
creatorflow.files.dir=${user.home}/.creatorflow-server/files
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=26MB
