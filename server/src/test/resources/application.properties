spring.datasource.url=jdbc:h2:mem:registry-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# gallery uploads land under target/ so tests stay hermetic
creatorflow.files.dir=target/test-files
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=26MB

# effectively disable request throttling for the hermetic test suite
creatorflow.ratelimit.capacity=1000000
